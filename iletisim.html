<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Form</title>
    <style>
        /* Optional basic styling */
        .comment-box { max-width: 400px; margin: 20px auto; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        #formStatus { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="comment-box">
    <h3>Leave a Comment</h3>
    <form id="commentForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="comment">Comment:</label>
            <textarea id="comment" rows="5" required></textarea>
        </div>
        <button type="submit" id="submitBtn">Submit Comment</button>
        <div style="display:none;">
            <label>Keep this field blank</label>
            <input type="text" id="honeypot" autocomplete="off">
        </div>
    </form>
    <div id="formStatus"></div>
</div>

<script>
    document.getElementById('commentForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Stop page from reloading
        
        const submitBtn = document.getElementById('submitBtn');
        const statusDiv = document.getElementById('formStatus');
        
        // Replace this with your actual Google Apps Script Web App URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzDE8xfRgiwqI-zciCvMn0P6xGVMWerH4T2EFCWbpkMl0hMNjsjURANyR1aXZjYFsMpdg/exec';
        
        // Gather form data
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            comment: document.getElementById('comment').value,
            honeypot: document.getElementById('honeypot').value
        };
        
        // UI Updates
        submitBtn.disabled = true;
        statusDiv.textContent = "Sending your comment...";
        statusDiv.style.color = "black";

        // Send data to Google Script
        fetch(scriptUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'text/plain' // Using text/plain avoids certain strict CORS preflight snags
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            statusDiv.textContent = "Comment sent successfully!";
            statusDiv.style.color = "green";
            document.getElementById('commentForm').reset(); // Clear the form
        })
        .catch(error => {
            console.error('Error:', error);
            statusDiv.textContent = "An error occurred while sending.";
            statusDiv.style.color = "red";
        })
        .finally(() => {
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
